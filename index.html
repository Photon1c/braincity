<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>CityBrain v3 — BrainCity Engine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
    :root {
        --cyan: #00e5ff;
        --magenta: #ff0066;
        --gold: #ffaa00;
        --bg: #01040a;
        --panel-bg: linear-gradient(135deg, rgba(255,255,255,0.10), rgba(0,229,255,0.04));
        --panel-border: rgba(0,229,255,0.22);
    }
    html, body {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background: var(--bg); overflow: hidden; user-select: none;
        font-family: 'JetBrains Mono', 'Fira Code', 'Monaco', monospace;
        color: #fff;
    }
    canvas { display: block; position: absolute; top: 0; left: 0; }
    #hud {
        position: absolute; z-index: 10; top: 16px; left: 16px; width: 240px;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        backdrop-filter: blur(18px) saturate(160%);
        -webkit-backdrop-filter: blur(18px) saturate(160%);
        box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        padding: 12px 14px;
    }
    #hud h1 {
        font-size: 11px; letter-spacing: 2px; margin: 0 0 8px 0;
        color: var(--cyan); text-transform: uppercase; font-weight: 700;
        text-shadow: 0 0 8px rgba(0,229,255,0.5);
        border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 6px;
        display: flex; justify-content: space-between; align-items: baseline;
    }
    #hud h1 .view-tag { font-size: 8px; color: var(--gold); letter-spacing: 1px; }
    #hud .row {
        display: flex; justify-content: space-between; gap: 10px;
        font-size: 10px; letter-spacing: 0.4px; margin-bottom: 5px;
        color: rgba(255,255,255,0.55);
    }
    #hud .row span:last-child {
        color: var(--cyan); font-weight: 600; text-align: right;
        font-variant-numeric: tabular-nums;
    }
    #hud .empty { font-size: 10px; color: rgba(255,255,255,0.35); line-height: 1.5; }
    #hud .btn {
        margin-top: 10px; width: 100%; padding: 8px 10px;
        background: rgba(255,255,255,0.08); border: 1px solid var(--panel-border);
        color: var(--cyan); font-size: 9px; letter-spacing: 1.5px;
        text-transform: uppercase; border-radius: 999px; cursor: pointer;
        transition: all 0.15s;
    }
    #hud .btn:hover { background: rgba(0,229,255,0.16); box-shadow: 0 0 12px rgba(0,229,255,0.3); }
    #instructions {
        position: absolute; bottom: 16px; right: 16px; z-index: 10;
        font-size: 9px; letter-spacing: 0.8px; color: rgba(255,255,255,0.35);
        text-align: right; line-height: 1.6; pointer-events: none;
    }
    #legend {
        position: absolute; top: 16px; right: 16px; z-index: 10;
        background: var(--panel-bg);
        border: 1px solid var(--panel-border);
        border-radius: 12px;
        backdrop-filter: blur(18px) saturate(160%);
        -webkit-backdrop-filter: blur(18px) saturate(160%);
        box-shadow: 0 12px 30px rgba(0,0,0,0.4);
        padding: 10px 12px;
        font-size: 9px; color: rgba(255,255,255,0.8);
    }
    #legend .item { display: flex; align-items: center; gap: 6px; margin: 4px 0; }
    #legend .swatch { width: 12px; height: 12px; border-radius: 3px; }
</style>
</head>
<body>

<div id="hud">
    <h1>BrainCity <span class="view-tag" id="view-tag">CITY</span></h1>
    <div id="hud-stats"><div class="empty">Click a building to select it, then go neural to enter its signal network.</div></div>
    <button class="btn" id="hud-action" style="display:none;"></button>
</div>
<div id="instructions">Drag to orbit · Click to select · S for State Engine · Esc to surface</div>

<div id="legend">
    <div style="font-weight: 700; color: var(--cyan); margin-bottom: 6px; font-size: 10px;">EXECUTION ZONES</div>
    <div class="item"><div class="swatch" style="background:#0088ff"></div><span>Windows</span></div>
    <div class="item"><div class="swatch" style="background:#00ff88"></div><span>VPS</span></div>
    <div class="item"><div class="swatch" style="background:#ff8800"></div><span>Cloud</span></div>
    <div class="item"><div class="swatch" style="background:#aa44ff"></div><span>Cross-platform</span></div>
    <div style="margin-top: 10px; padding-top: 8px; border-top: 1px solid rgba(255,255,255,0.08); font-size: 9px; color: rgba(255,255,255,0.35);">
        <a href="https://github.com/Photon1c/braincity" target="_blank" style="color: var(--cyan); text-decoration: none; opacity: 0.7;">github.com/Photon1c/braincity</a>
    </div>
</div>

<!-- THREE.js from CDN via importmap, attached to window -->
<script type="importmap">
{
    "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
}
</script>
<script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
    import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
    import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
    import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

    window.THREE = THREE;
    window.OrbitControls = OrbitControls;
    window.EffectComposer = EffectComposer;
    window.RenderPass = RenderPass;
    window.UnrealBloomPass = UnrealBloomPass;
    window.dispatchEvent(new Event('citybrain:three-ready'));
</script>

<script src="src/shared/dataModel.js" defer></script>
<script src="src/shared/signalEngine.js" defer></script>
<script src="src/shared/cameraRig.js" defer></script>
<script src="src/shared/hud.js" defer></script>
<script src="src/ui/SidePanel.js" defer></script>
<script src="src/renderers/RendererCity.js" defer></script>
<script src="src/renderers/RendererNeural.js" defer></script>
<script src="src/state/StateEvolutionEngine.js" defer></script>
<script src="src/main.js" defer></script>

</body>
</html>
